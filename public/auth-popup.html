<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autenticando...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #94a3b8; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Redirigiendo al proveedor de identidad...</p>
  </div>
  <script>
    // Leer parámetros OAuth de la URL (pasados por authorize() al abrir el popup)
    const params = new URLSearchParams(window.location.search);
    const identityUrl = params.get('identityUrl');
    const clientId = params.get('client_id');
    const redirectUri = params.get('redirect_uri');
    const codeChallenge = params.get('code_challenge');
    const codeChallengeMethod = params.get('code_challenge_method');
    const state = params.get('state');

    if (!identityUrl || !clientId || !redirectUri || !codeChallenge) {
      document.querySelector('p').textContent = 'Error: parámetros de autenticación incompletos';
    } else {
      const authorizeParams = new URLSearchParams({
        client_id: clientId,
        redirect_uri: redirectUri,
        response_type: 'code',
        code_challenge: codeChallenge,
        code_challenge_method: codeChallengeMethod || 'S256',
      });
      if (state) params.set('state', state);
      window.location.href = identityUrl + '/login?' + authorizeParams.toString();
    }
  </script>
</body>
</html>
